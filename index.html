<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marius Games</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }
    
    /* Canvas Three.js en arrière-plan */
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    
    /* Titre principal 3D */
    .title-container {
      text-align: center;
      margin-bottom: 3rem;
      position: relative;
      z-index: 1;
      perspective: 1000px;
    }
    
    h1 {
      font-size: 6rem;
      font-weight: 900;
      letter-spacing: 8px;
      position: relative;
      transform-style: preserve-3d;
      animation: titleFloat 4s ease-in-out infinite;
    }
    
    .title-3d {
      display: inline-block;
      background: linear-gradient(135deg, #00f5ff 0%, #4A90E2 30%, #ff00aa 60%, #00f5ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 300% 300%;
      animation: gradientShift 5s ease infinite, titleGlow 3s ease-in-out infinite;
      text-shadow: 
        0 0 20px rgba(0, 245, 255, 0.5),
        0 0 40px rgba(74, 144, 226, 0.3),
        0 0 60px rgba(255, 0, 170, 0.2);
      position: relative;
    }
    
    .title-3d::before {
      content: 'MARIUS GAMES';
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      background: linear-gradient(135deg, #00f5ff 0%, #4A90E2 30%, #ff00aa 60%, #00f5ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: blur(30px);
      opacity: 0.6;
      animation: gradientShift 5s ease infinite;
      z-index: -1;
    }
    
    @keyframes titleFloat {
      0%, 100% { 
        transform: translateY(0) rotateX(0);
      }
      50% { 
        transform: translateY(-10px) rotateX(2deg);
      }
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    @keyframes titleGlow {
      0%, 100% { 
        filter: brightness(1) drop-shadow(0 0 20px rgba(0, 245, 255, 0.6));
      }
      50% { 
        filter: brightness(1.3) drop-shadow(0 0 40px rgba(74, 144, 226, 0.8));
      }
    }
    
    .subtitle {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.4rem;
      margin-top: 1.5rem;
      letter-spacing: 12px;
      text-transform: uppercase;
      font-weight: 300;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      animation: subtitlePulse 3s ease-in-out infinite;
    }
    
    @keyframes subtitlePulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    
    /* Container des jeux */
    .games-container {
      display: flex;
      flex-wrap: wrap;
      gap: 4rem;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    
    /* Cartes de jeux glassmorphism */
    .game-card {
      position: relative;
      width: 340px;
      height: 440px;
      border-radius: 30px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 0 0 1px rgba(255, 255, 255, 0.1);
    }
    
    .game-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, 
        rgba(255, 255, 255, 0.1) 0%, 
        rgba(255, 255, 255, 0) 50%,
        rgba(0, 0, 0, 0.4) 100%);
      z-index: 1;
      pointer-events: none;
    }
    
    .game-card:hover {
      transform: translateY(-20px) scale(1.03);
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 40px rgba(0, 245, 255, 0.2);
    }
    
    /* Bordure lumineuse animée */
    .game-card::after {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, transparent, transparent, transparent);
      border-radius: 30px;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.5s;
    }
    
    .game-card.pong::after {
      background: linear-gradient(90deg, #00f5ff, #ff00aa, #00f5ff);
      background-size: 200% 100%;
      animation: borderGlow 3s linear infinite;
    }
    
    .game-card.skiclub::after {
      background: linear-gradient(90deg, #4A90E2, #87CEEB, #4A90E2);
      background-size: 200% 100%;
      animation: borderGlow 3s linear infinite;
    }
    
    @keyframes borderGlow {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    
    .game-card:hover::after {
      opacity: 1;
    }
    
    /* Visuels des jeux */
    .game-visual {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 60%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7rem;
      transition: all 0.5s;
      overflow: hidden;
    }
    
    .game-card:hover .game-visual {
      transform: scale(1.15);
    }
    
    .pong .game-visual {
      background: linear-gradient(135deg, rgba(0, 245, 255, 0.15) 0%, rgba(255, 0, 170, 0.15) 100%);
    }
    
    .pong .game-visual::before {
      content: '';
      position: absolute;
      width: 150%;
      height: 150%;
      background: radial-gradient(circle, rgba(0, 245, 255, 0.3) 0%, transparent 70%);
      animation: pulseGlow 3s ease-in-out infinite;
    }
    
    .skiclub .game-visual {
      background: linear-gradient(135deg, rgba(74, 144, 226, 0.2) 0%, rgba(135, 206, 235, 0.2) 100%);
    }
    
    .skiclub .game-visual::before {
      content: '';
      position: absolute;
      width: 150%;
      height: 150%;
      background: radial-gradient(circle, rgba(74, 144, 226, 0.3) 0%, transparent 70%);
      animation: pulseGlow 3s ease-in-out infinite;
    }
    
    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }
    
    .game-emoji {
      position: relative;
      z-index: 2;
      filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.5));
      transition: transform 0.3s;
    }
    
    .game-card:hover .game-emoji {
      transform: rotate(5deg) scale(1.1);
    }
    
    /* Contenu de la carte */
    .game-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2rem;
      z-index: 2;
    }
    
    .game-title {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
      transition: all 0.3s;
    }
    
    .pong .game-title {
      color: #00f5ff;
      text-shadow: 0 0 30px rgba(0, 245, 255, 0.8);
    }
    
    .skiclub .game-title {
      color: #4A90E2;
      text-shadow: 0 0 30px rgba(74, 144, 226, 0.8);
    }
    
    .game-description {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    
    /* Bouton jouer */
    .play-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.9rem 2.5rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      transition: all 0.4s;
      border: 2px solid;
      background: transparent;
      cursor: pointer;
    }
    
    .pong .play-button {
      color: #00f5ff;
      border-color: #00f5ff;
      box-shadow: 
        0 0 20px rgba(0, 245, 255, 0.3),
        inset 0 0 20px rgba(0, 245, 255, 0.1);
    }
    
    .pong .play-button:hover {
      background: #00f5ff;
      color: #000;
      box-shadow: 
        0 0 40px rgba(0, 245, 255, 0.6),
        inset 0 0 20px rgba(0, 245, 255, 0.2);
      transform: scale(1.05);
    }
    
    .skiclub .play-button {
      color: #4A90E2;
      border-color: #4A90E2;
      box-shadow: 
        0 0 20px rgba(74, 144, 226, 0.3),
        inset 0 0 20px rgba(74, 144, 226, 0.1);
    }
    
    .skiclub .play-button:hover {
      background: #4A90E2;
      color: #fff;
      box-shadow: 
        0 0 40px rgba(74, 144, 226, 0.6),
        inset 0 0 20px rgba(74, 144, 226, 0.2);
      transform: scale(1.05);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      h1 {
        font-size: 3.5rem;
        letter-spacing: 4px;
      }
      
      .subtitle {
        font-size: 1rem;
        letter-spacing: 6px;
      }
      
      .games-container {
        gap: 2rem;
      }
      
      .game-card {
        width: 300px;
        height: 400px;
      }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  
  <div class="title-container">
    <h1><span class="title-3d">MARIUS GAMES</span></h1>
    <div class="subtitle">Collection de Jeux</div>
  </div>
  
  <nav class="games-container">
    <a href="pong/index.html" class="game-card pong">
      <div class="game-visual">
        <span class="game-emoji">🏓</span>
      </div>
      <div class="game-content">
        <div class="game-title">PONG</div>
        <div class="game-description">
          Le classique jeu de tennis de table revisité avec un style néon futuriste. Solo ou à deux joueurs.
        </div>
        <div class="play-button">▶ Jouer</div>
      </div>
    </a>
    
    <a href="skiclub/index.html" class="game-card skiclub">
      <div class="game-visual">
        <span class="game-emoji">⛷️</span>
      </div>
      <div class="game-content">
        <div class="game-title">SKICLUB</div>
        <div class="game-description">
          Descendez les pistes enneigées et slalomez entre les portes dans ce jeu de ski alpin aux couleurs des JO d'hiver.
        </div>
        <div class="play-button">▶ Jouer</div>
      </div>
    </a>
  </nav>

  <script>
    // Three.js Background Animation
    const canvas = document.getElementById('bg-canvas');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    
    // Création des particules
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCount = 800;
    const posArray = new Float32Array(particlesCount * 3);
    const colorArray = new Float32Array(particlesCount * 3);
    
    for(let i = 0; i < particlesCount * 3; i += 3) {
      // Positions
      posArray[i] = (Math.random() - 0.5) * 50;
      posArray[i+1] = (Math.random() - 0.5) * 50;
      posArray[i+2] = (Math.random() - 0.5) * 50;
      
      // Couleurs (cyan, bleu, magenta)
      const colorChoice = Math.random();
      if (colorChoice < 0.33) {
        // Cyan
        colorArray[i] = 0;
        colorArray[i+1] = 0.96;
        colorArray[i+2] = 1;
      } else if (colorChoice < 0.66) {
        // Bleu
        colorArray[i] = 0.29;
        colorArray[i+1] = 0.56;
        colorArray[i+2] = 0.89;
      } else {
        // Magenta
        colorArray[i] = 1;
        colorArray[i+1] = 0;
        colorArray[i+2] = 0.67;
      }
    }
    
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
    
    const particlesMaterial = new THREE.PointsMaterial({
      size: 0.15,
      vertexColors: true,
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending
    });
    
    const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(particlesMesh);
    
    // Lignes connectées entre particules proches
    const linesMaterial = new THREE.LineBasicMaterial({
      color: 0x4A90E2,
      transparent: true,
      opacity: 0.1
    });
    
    // Lignes horizontales pour effet de grille
    const gridHelper = new THREE.GridHelper(100, 50, 0x00f5ff, 0x1a1a3e);
    gridHelper.position.y = -20;
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.2;
    scene.add(gridHelper);
    
    // Étoiles filantes
    const shootingStars = [];
    const starGeometry = new THREE.SphereGeometry(0.1, 8, 8);
    
    function createShootingStar() {
      const star = new THREE.Mesh(starGeometry, new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 1
      }));
      
      star.position.x = (Math.random() - 0.5) * 40;
      star.position.y = Math.random() * 10 + 10;
      star.position.z = (Math.random() - 0.5) * 40;
      
      star.userData = {
        velocity: new THREE.Vector3(
          (Math.random() - 0.5) * 0.3,
          -Math.random() * 0.3 - 0.1,
          (Math.random() - 0.5) * 0.3
        ),
        trail: []
      };
      
      scene.add(star);
      shootingStars.push(star);
    }
    
    // Animation
    camera.position.z = 20;
    
    let time = 0;
    
    function animate() {
      requestAnimationFrame(animate);
      time += 0.001;
      
      // Rotation des particules
      particlesMesh.rotation.y = time * 0.2;
      particlesMesh.rotation.x = Math.sin(time * 0.5) * 0.1;
      
      // Effet de vague sur les particules
      const positions = particlesGeometry.attributes.position.array;
      for(let i = 0; i < particlesCount; i++) {
        const i3 = i * 3;
        positions[i3 + 1] += Math.sin(time * 2 + positions[i3] * 0.1) * 0.01;
      }
      particlesGeometry.attributes.position.needsUpdate = true;
      
      // Animation de la grille
      gridHelper.position.z = (time * 10) % 10;
      
      // Création aléatoire d'étoiles filantes
      if (Math.random() < 0.02) {
        createShootingStar();
      }
      
      // Mise à jour des étoiles filantes
      for (let i = shootingStars.length - 1; i >= 0; i--) {
        const star = shootingStars[i];
        star.position.add(star.userData.velocity);
        star.material.opacity -= 0.02;
        
        if (star.material.opacity <= 0) {
          scene.remove(star);
          shootingStars.splice(i, 1);
        }
      }
      
      renderer.render(scene, camera);
    }
    
    animate();
    
    // Gestion du redimensionnement
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // Interaction souris
    let mouseX = 0;
    let mouseY = 0;
    
    document.addEventListener('mousemove', (event) => {
      mouseX = (event.clientX / window.innerWidth) * 2 - 1;
      mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
      
      camera.position.x += (mouseX * 2 - camera.position.x) * 0.05;
      camera.position.y += (mouseY * 2 - camera.position.y) * 0.05;
      camera.lookAt(scene.position);
    });
  </script>
</body>
</html>
