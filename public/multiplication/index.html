<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplication Master - Marius Games</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      position: relative;
    }
    
    /* Particules d'arrière-plan */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #00ff88;
      border-radius: 50%;
      opacity: 0.3;
      animation: float 15s infinite;
    }
    
    @keyframes float {
      0%, 100% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.3;
      }
      90% {
        opacity: 0.3;
      }
      100% {
        transform: translateY(-100vh) rotate(720deg);
        opacity: 0;
      }
    }
    
    /* Container principal */
    .game-container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }
    
    /* Titre */
    .title {
      font-size: 3.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #00ff88 0%, #00ccff 50%, #ff00ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 60px rgba(0, 255, 136, 0.5);
      margin-bottom: 0.5rem;
      letter-spacing: 4px;
    }
    
    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 1.2rem;
      margin-bottom: 2rem;
      letter-spacing: 2px;
    }
    
    /* Score */
    .score-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 1.5rem 3rem;
      margin-bottom: 2rem;
      display: inline-block;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .score-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 0.5rem;
    }
    
    .score-value {
      font-size: 4rem;
      font-weight: 700;
      color: #00ff88;
      text-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
      transition: all 0.3s ease;
    }
    
    .score-value.error {
      color: #ff4444;
      text-shadow: 0 0 30px rgba(255, 68, 68, 0.8);
      animation: shake 0.5s ease;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    
    /* Barre de progression */
    .progress-bar {
      width: 100%;
      max-width: 400px;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      margin: 1rem auto;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00ff88, #00ccff);
      border-radius: 4px;
      transition: width 0.5s ease;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    }
    
    /* Niveau de difficulté */
    .difficulty {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1rem;
      margin-top: 1rem;
    }
    
    .difficulty span {
      color: #00ccff;
      font-weight: 600;
    }
    
    /* Vies */
    .lives-container {
      margin-top: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .lives-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .lives {
      font-size: 1.8rem;
      letter-spacing: 5px;
      transition: all 0.3s ease;
    }
    
    .lives.lost {
      animation: heartBreak 0.5s ease;
    }
    
    @keyframes heartBreak {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); filter: grayscale(100%); }
      100% { transform: scale(1); }
    }
    
    /* Zone de jeu */
    .game-area {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      padding: 3rem;
      margin-top: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      min-width: 400px;
    }
    
    /* Question */
    .question {
      font-size: 5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2rem;
      text-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
      letter-spacing: 10px;
    }
    
    .question span {
      display: inline-block;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    /* Input */
    .answer-input {
      width: 200px;
      padding: 1.5rem;
      font-size: 2.5rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 15px;
      color: #fff;
      outline: none;
      transition: all 0.3s ease;
      font-weight: 600;
    }
    
    .answer-input:focus {
      border-color: #00ff88;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
      background: rgba(255, 255, 255, 0.15);
    }
    
    .answer-input.correct {
      border-color: #00ff88;
      background: rgba(0, 255, 136, 0.2);
      animation: correctPulse 0.5s ease;
    }
    
    .answer-input.wrong {
      border-color: #ff4444;
      background: rgba(255, 68, 68, 0.2);
      animation: wrongShake 0.5s ease;
    }
    
    @keyframes correctPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); box-shadow: 0 0 50px rgba(0, 255, 136, 0.8); }
      100% { transform: scale(1); }
    }
    
    @keyframes wrongShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    
    /* Écran Game Over */
    .game-over {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .game-over.show {
      display: flex;
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .game-over-title {
      font-size: 4rem;
      color: #ff4444;
      text-shadow: 0 0 40px rgba(255, 68, 68, 0.8);
      margin-bottom: 1rem;
      animation: gameOverPulse 1s ease-in-out infinite;
    }
    
    @keyframes gameOverPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .game-over-text {
      font-size: 1.5rem;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 2rem;
    }
    
    .final-score {
      font-size: 3rem;
      color: #00ff88;
      margin-bottom: 2rem;
      text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
    }
    
    .restart-btn {
      padding: 1.5rem 4rem;
      font-size: 1.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 4px;
      background: transparent;
      border: 3px solid #00ff88;
      border-radius: 50px;
      color: #00ff88;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .restart-btn:hover {
      background: #00ff88;
      color: #000;
      box-shadow: 0 0 60px rgba(0, 255, 136, 0.8);
      transform: scale(1.1);
    }
    
    /* Bouton retour */
    .back-btn {
      position: absolute;
      top: 2rem;
      left: 2rem;
      padding: 0.8rem 1.5rem;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      z-index: 10;
    }
    
    .back-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: #00ff88;
      color: #00ff88;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
    }
    
    /* Clavier numérique virtuel */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 1.5rem;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .numpad-btn {
      width: 80px;
      height: 70px;
      font-size: 1.8rem;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 15px;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .numpad-btn:hover {
      background: rgba(0, 255, 136, 0.2);
      border-color: #00ff88;
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
    }
    
    .numpad-btn:active {
      transform: scale(0.95);
      background: rgba(0, 255, 136, 0.4);
    }
    
    .numpad-btn.wide {
      grid-column: span 2;
      width: auto;
    }
    
    .numpad-btn.action {
      background: rgba(0, 255, 136, 0.2);
      border-color: #00ff88;
    }
    
    .numpad-btn.action:hover {
      background: #00ff88;
      color: #000;
    }
    
    .numpad-btn.clear {
      background: rgba(255, 68, 68, 0.2);
      border-color: #ff4444;
    }
    
    .numpad-btn.clear:hover {
      background: #ff4444;
      color: #fff;
    }
    
    /* Message de feedback */
    .feedback {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 4rem;
      font-weight: 900;
      pointer-events: none;
      opacity: 0;
      z-index: 50;
    }
    
    .feedback.show {
      animation: feedbackPop 0.8s ease forwards;
    }
    
    @keyframes feedbackPop {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.2);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1) translateY(-50px);
      }
    }
    
    .feedback.correct {
      color: #00ff88;
      text-shadow: 0 0 40px rgba(0, 255, 136, 0.8);
    }
    
    .feedback.wrong {
      color: #ff4444;
      text-shadow: 0 0 40px rgba(255, 68, 68, 0.8);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .title {
        font-size: 2.5rem;
      }
      
      .game-area {
        min-width: auto;
        width: 90%;
        padding: 2rem 1rem;
      }
      
      .question {
        font-size: 3.5rem;
      }
      
      .answer-input {
        width: 150px;
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <!-- Particules d'arrière-plan -->
  <div class="particles" id="particles"></div>
  
  <!-- Bouton retour -->
  <a href="../index.html" class="back-btn">← Retour</a>
  
  <!-- Container principal -->
  <div class="game-container">
    <h1 class="title">MULTIPLICATION</h1>
    <p class="subtitle">Atteins le score de 100 !</p>
    
    <!-- Score -->
    <div class="score-container">
      <div class="score-label">Score</div>
      <div class="score-value" id="score">0</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress" style="width: 0%"></div>
      </div>
      <div class="difficulty">
        Niveau: <span id="level">Facile (Tables 1-2)</span>
      </div>
      <div class="lives-container">
        <span class="lives-label">Vies:</span>
        <span class="lives" id="lives">❤️❤️❤️</span>
      </div>
    </div>
    
    <!-- Zone de jeu -->
    <div class="game-area">
      <div class="question" id="question">
        <span id="num1">?</span> × <span id="num2">?</span>
      </div>
      <input type="text" class="answer-input" id="answer" placeholder="?" autofocus readonly>
      
      <!-- Clavier numérique virtuel -->
      <div class="numpad" id="numpad">
        <button class="numpad-btn" data-key="1">1</button>
        <button class="numpad-btn" data-key="2">2</button>
        <button class="numpad-btn" data-key="3">3</button>
        <button class="numpad-btn" data-key="4">4</button>
        <button class="numpad-btn" data-key="5">5</button>
        <button class="numpad-btn" data-key="6">6</button>
        <button class="numpad-btn" data-key="7">7</button>
        <button class="numpad-btn" data-key="8">8</button>
        <button class="numpad-btn" data-key="9">9</button>
        <button class="numpad-btn clear" data-key="C">C</button>
        <button class="numpad-btn" data-key="0">0</button>
        <button class="numpad-btn action" data-key="ENTER">↵</button>
      </div>
    </div>
  </div>
  
  <!-- Écran Game Over -->
  <div class="game-over" id="gameOver">
    <div class="game-over-title">GAME OVER</div>
    <div class="game-over-text">Tu as perdu toutes tes vies !</div>
    <div class="final-score">Score final: <span id="finalScore">0</span></div>
    <button class="restart-btn" id="restart">Recommencer</button>
  </div>
  
  <!-- Message de feedback -->
  <div class="feedback" id="feedback"></div>

  <script>
    // Variables du jeu
    let score = 0;
    let lives = 3;
    let currentNum1 = 0;
    let currentNum2 = 0;
    let isGameOver = false;
    
    // Niveaux de difficulté - progression plus rapide (tous les 5 points)
    const levels = [
      { min: 2, max: 5, name: "Débutant (2-5)" },
      { min: 3, max: 7, name: "Intermédiaire (3-7)" },
      { min: 4, max: 9, name: "Avancé (4-9)" },
      { min: 5, max: 10, name: "Confirmé (5-10)" },
      { min: 6, max: 11, name: "Expert (6-11)" },
      { min: 7, max: 12, name: "Pro (7-12)" },
      { min: 8, max: 15, name: "Master (8-15)" },
      { min: 10, max: 20, name: "Champion (10-20)" },
      { min: 12, max: 25, name: "Elite (12-25)" },
      { min: 15, max: 30, name: "Légendaire (15-30)" },
      { min: 20, max: 50, name: "Impossible (20-50)" },
      { min: 25, max: 99, name: "INHUMAIN (25-99)" }
    ];
    
    // Éléments du DOM
    const scoreElement = document.getElementById('score');
    const progressElement = document.getElementById('progress');
    const levelElement = document.getElementById('level');
    const num1Element = document.getElementById('num1');
    const num2Element = document.getElementById('num2');
    const answerInput = document.getElementById('answer');
    const gameOverScreen = document.getElementById('gameOver');
    const finalScoreElement = document.getElementById('finalScore');
    const restartBtn = document.getElementById('restart');
    const feedbackElement = document.getElementById('feedback');
    
    // Créer les particules d'arrière-plan
    function createParticles() {
      const container = document.getElementById('particles');
      const colors = ['#00ff88', '#00ccff', '#ff00ff', '#ffff00'];
      
      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (10 + Math.random() * 10) + 's';
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        container.appendChild(particle);
      }
    }
    
    // Obtenir le niveau actuel basé sur le score (tous les 5 points)
    function getCurrentLevel() {
      const levelIndex = Math.min(Math.floor(score / 5), levels.length - 1);
      return levels[levelIndex];
    }
    
    // Générer une nouvelle question avec plus d'aléatoire
    function generateQuestion() {
      const level = getCurrentLevel();
      
      // Aléatoire plus poussé : mélange différentes stratégies
      const strategy = Math.random();
      
      if (strategy < 0.6) {
        // 60% : génération standard dans la plage du niveau
        currentNum1 = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
        currentNum2 = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
      } else if (strategy < 0.8) {
        // 20% : un nombre petit, un grand (pour varier la difficulté)
        currentNum1 = Math.floor(Math.random() * 5) + 2;
        currentNum2 = Math.floor(Math.random() * (level.max - 10 + 1)) + 10;
      } else if (strategy < 0.9) {
        // 10% : deux grands nombres
        currentNum1 = Math.floor(Math.random() * (level.max - 8 + 1)) + 8;
        currentNum2 = Math.floor(Math.random() * (level.max - 8 + 1)) + 8;
      } else {
        // 10% : nombre premier ou difficile
        const hardNumbers = [7, 11, 13, 17, 19, 23];
        currentNum1 = hardNumbers[Math.floor(Math.random() * hardNumbers.length)];
        currentNum2 = Math.floor(Math.random() * (level.max - level.min + 1)) + level.min;
      }
      
      // S'assurer que le résultat ne dépasse pas 10000
      if (currentNum1 * currentNum2 > 10000) {
        currentNum1 = Math.floor(Math.random() * 20) + 1;
        currentNum2 = Math.floor(Math.random() * 20) + 1;
      }
      
      num1Element.textContent = currentNum1;
      num2Element.textContent = currentNum2;
      
      // Mettre à jour l'affichage du niveau
      levelElement.textContent = level.name;
      
      // Animation d'apparition
      num1Element.style.animation = 'none';
      num2Element.style.animation = 'none';
      setTimeout(() => {
        num1Element.style.animation = 'pulse 2s ease-in-out infinite';
        num2Element.style.animation = 'pulse 2s ease-in-out infinite';
      }, 10);
    }
    
    // Mettre à jour l'affichage du score
    function updateScore() {
      scoreElement.textContent = score;
      progressElement.style.width = score + '%';
      
      if (score >= 100) {
        showVictory();
      }
    }
    
    // Afficher un feedback
    function showFeedback(isCorrect) {
      feedbackElement.textContent = isCorrect ? '✓' : '✗';
      feedbackElement.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
      
      setTimeout(() => {
        feedbackElement.classList.remove('show');
      }, 800);
    }
    
    // Vérifier la réponse
    function checkAnswer() {
      if (isGameOver) return;
      
      const userAnswer = parseInt(answerInput.value);
      const correctAnswer = currentNum1 * currentNum2;
      
      if (isNaN(userAnswer)) return;
      
      if (userAnswer === correctAnswer) {
        // Bonne réponse
        score++;
        updateScore();
        showFeedback(true);
        
        answerInput.classList.add('correct');
        setTimeout(() => {
          answerInput.classList.remove('correct');
          answerInput.value = '';
          generateQuestion();
          answerInput.focus();
        }, 500);
      } else {
        // Mauvaise réponse - Perdre une vie
        lives--;
        updateLives();
        showFeedback(false);
        answerInput.classList.add('wrong');
        
        if (lives <= 0) {
          // Plus de vies - Game Over
          scoreElement.classList.add('error');
          setTimeout(() => {
            showGameOver();
          }, 500);
        } else {
          // Encore des vies - continuer avec nouvelle question
          setTimeout(() => {
            answerInput.classList.remove('wrong');
            answerInput.value = '';
            generateQuestion();
            answerInput.focus();
          }, 800);
        }
      }
    }
    
    // Mettre à jour l'affichage des vies
    function updateLives() {
      const livesElement = document.getElementById('lives');
      const hearts = '❤️'.repeat(Math.max(0, lives));
      const broken = '💔'.repeat(3 - Math.max(0, lives));
      livesElement.textContent = hearts + broken;
      
      if (lives < 3) {
        livesElement.classList.add('lost');
        setTimeout(() => {
          livesElement.classList.remove('lost');
        }, 500);
      }
    }
    
    // Afficher l'écran Game Over
    function showGameOver() {
      isGameOver = true;
      finalScoreElement.textContent = score;
      gameOverScreen.classList.add('show');
    }
    
    // Afficher l'écran de victoire
    function showVictory() {
      isGameOver = true;
      document.querySelector('.game-over-title').textContent = 'VICTOIRE !';
      document.querySelector('.game-over-title').style.color = '#00ff88';
      document.querySelector('.game-over-text').textContent = 'Félicitations ! Tu as atteint 100 !';
      finalScoreElement.textContent = score;
      gameOverScreen.classList.add('show');
    }
    
    // Redémarrer le jeu
    function restartGame() {
      score = 0;
      lives = 3;
      isGameOver = false;
      updateScore();
      updateLives();
      scoreElement.classList.remove('error');
      answerInput.classList.remove('wrong');
      answerInput.value = '';
      gameOverScreen.classList.remove('show');
      
      // Réinitialiser le texte de victoire
      document.querySelector('.game-over-title').textContent = 'GAME OVER';
      document.querySelector('.game-over-title').style.color = '#ff4444';
      document.querySelector('.game-over-text').textContent = 'Tu as perdu toutes tes vies !';
      
      generateQuestion();
      answerInput.focus();
    }
    
    // Support tactile pour les boutons du clavier
    let touchStartTime;
    document.querySelectorAll('.numpad-btn').forEach(btn => {
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        touchStartTime = Date.now();
        btn.style.transform = 'scale(0.95)';
        btn.style.background = 'rgba(0, 255, 136, 0.4)';
      });
      
      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        btn.style.transform = '';
        btn.style.background = '';
        const key = btn.getAttribute('data-key');
        handleNumpadInput(key);
      });
    });
    
    // Gestion du clavier numérique virtuel
    const numpad = document.getElementById('numpad');
    
    numpad.addEventListener('click', (e) => {
      if (e.target.classList.contains('numpad-btn')) {
        const key = e.target.getAttribute('data-key');
        handleNumpadInput(key);
      }
    });
    
    function handleNumpadInput(key) {
      if (isGameOver) return;
      
      if (key === 'C') {
        // Effacer
        answerInput.value = '';
      } else if (key === 'ENTER') {
        // Valider
        checkAnswer();
      } else if (key >= '0' && key <= '9') {
        // Ajouter un chiffre (max 5 chiffres)
        if (answerInput.value.length < 5) {
          answerInput.value += key;
        }
      }
      
      // Focus sur l'input pour les animations
      answerInput.focus();
    }
    
    // Support du clavier physique aussi
    document.addEventListener('keydown', (e) => {
      if (isGameOver) return;
      
      if (e.key >= '0' && e.key <= '9') {
        if (answerInput.value.length < 5) {
          answerInput.value += e.key;
        }
      } else if (e.key === 'Backspace') {
        answerInput.value = answerInput.value.slice(0, -1);
      } else if (e.key === 'Enter') {
        checkAnswer();
      } else if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') {
        answerInput.value = '';
      }
      
      // Empêcher le comportement par défaut pour certaines touches
      if (['Backspace', 'Enter', 'Escape'].includes(e.key)) {
        e.preventDefault();
      }
    });
    
    restartBtn.addEventListener('click', restartGame);
    
    // Démarrer le jeu
    createParticles();
    generateQuestion();
    answerInput.focus();
  </script>
</body>
</html>
